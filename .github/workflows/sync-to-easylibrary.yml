name: Sync to EasyLibrary

on:
  push:
    branches: [development]
    paths:
      - 'src/imperazim/command/**'

jobs:
  sync:
    if: "!contains(github.event.head_commit.message, '[sync]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout LibCommand
        uses: actions/checkout@v7
        with:
          path: standalone

      - name: Checkout EasyLibrary
        uses: actions/checkout@v7
        with:
          repository: ImperaZim/EasyLibrary
          ref: development
          token: ${{ secrets.SYNC_TOKEN }}
          path: easylibrary

      - name: Sync files
        run: |
          SRC="standalone/src/imperazim/command"
          DEST="easylibrary/src/imperazim/command"

          rm -rf "$DEST"
          mkdir -p "$DEST"

          rsync -av --exclude='LibCommand.php' "$SRC/" "$DEST/"

      - name: Commit and push
        run: |
          cd easylibrary
          git config user.name "ImperaZim"
          git config user.email "imperaartz1@gmail.com"
          git add src/imperazim/command/
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "[sync] Update embedded LibCommand from standalone"
          for attempt in 1 2 3 4 5; do
            if git push origin development; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            git fetch origin development
            git rebase origin/development
            sleep $((attempt * 2))
          done
